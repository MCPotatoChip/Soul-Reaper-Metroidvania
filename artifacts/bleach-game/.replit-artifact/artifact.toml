kind = "web"
previewPath = "/"
title = "Bleach: Soul Society Underground"
version = "1.0.0"
id = "artifacts/bleach-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25980

[services.development]
run = "pnpm --filter @workspace/bleach-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bleach-game", "run", "build" ]
publicDir = "artifacts/bleach-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25980"
BASE_PATH = "/"
