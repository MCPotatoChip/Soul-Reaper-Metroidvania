name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change to 'master' if your primary branch is master
  workflow_dispatch:

# Future-proof the pipeline by forcing JavaScript actions to run on Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Upgraded from 20 to 24

      # Install PNPM on the runner to support your workspace configuration
      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Bootstrap dependencies for the entire workspace from the root folder
      - name: Install Workspace Dependencies
        run: pnpm install --no-frozen-lockfile

      # Build the bleach-game app using the monorepo filter scope
      - name: Build Game Subproject
        run: pnpm --filter @workspace/bleach-game run build

      # Upload the compiled artifact bundle
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/bleach-game/dist/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4