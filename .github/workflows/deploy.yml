name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your main GitHub branch is called master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Since your root has a package.json, we install the root workspace dependencies first
      - name: Install Dependencies
        run: npm install

      # This runs the build command specifically targeting your bleach-game build output
      - name: Build Project
        run: npm run build --prefix bleach-game --if-present || npx vite build bleach-game

      # Tells GitHub to upload the specific build folder inside your subproject
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './bleach-game/dist/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4