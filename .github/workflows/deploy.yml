name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your primary branch is called master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Step into the actual artifacts folder location to parse your packages
      - name: Install Subproject Dependencies
        run: |
          cd artifacts/bleach-game
          npm install

      # 2. Compile Vite distribution assets using localized scripts
      - name: Build Subproject
        run: |
          cd artifacts/bleach-game
          npm run build

      # 3. Target the correct output assets folder for GitHub pages hosting
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/bleach-game/dist/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4